# =============================================================
# RustPanel - CI/CD: Build & Push Docker Images to GHCR
# =============================================================
#
# Triggered on every push to 'main'.
# Builds both images for linux/amd64 (VPS compatible).
# Pushes to ghcr.io/joaocrj/rustpanel-{agent,frontend}:latest
#
# Secrets required (set in GitHub repo Settings → Secrets → Actions):
#   VITE_SUPABASE_URL      — Supabase project URL (build arg for frontend)
#   VITE_SUPABASE_ANON_KEY — Supabase anon key (build arg for frontend)
#
# Permissions required per job:
#   contents: read      — checkout the private repo
#   packages: write     — push images to GHCR
#   actions: write      — read/write GHA layer cache (type=gha)
#   attestations: write — push OCI attestations alongside the image
#   id-token: write     — generate OIDC token for provenance signing
#
# NOTE: When you explicitly specify `permissions:` in a GitHub Actions
# job, ALL unspecified permissions default to `none`. So every permission
# the job needs must be explicitly listed — even actions:write for cache.
# =============================================================

name: Build & Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'agent/**'
      - 'frontend/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  AGENT_IMAGE: ghcr.io/joaocrj/rustpanel-agent
  FRONTEND_IMAGE: ghcr.io/joaocrj/rustpanel-frontend

jobs:
  # ============================================================
  # Job 1: Build and push the Agent image
  # ============================================================
  build-agent:
    name: Build Agent
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout private repo
      packages: write      # push to GHCR
      actions: write       # read/write GHA layer cache
      attestations: write  # push OCI attestations
      id-token: write      # OIDC token for provenance signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Agent image
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          provenance: false  # disable provenance to keep image size small
          sbom: false        # disable SBOM for simplicity
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

  # ============================================================
  # Job 2: Build and push the Frontend image
  # ============================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout private repo
      packages: write      # push to GHCR
      actions: write       # read/write GHA layer cache
      attestations: write  # push OCI attestations
      id-token: write      # OIDC token for provenance signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          provenance: false  # disable provenance to keep image size small
          sbom: false        # disable SBOM for simplicity
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ============================================================
  # Job 3: Summary notification
  # ============================================================
  notify:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [build-agent, build-frontend]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## RustPanel Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| rustpanel-agent | ${{ needs.build-agent.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| rustpanel-frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy to VPS" >> $GITHUB_STEP_SUMMARY
          echo "Run on your VPS after a successful build:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo 'docker service update --image ghcr.io/joaocrj/rustpanel-agent:latest rustpanel_agent' >> $GITHUB_STEP_SUMMARY
          echo 'docker service update --image ghcr.io/joaocrj/rustpanel-frontend:latest rustpanel_frontend' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
